<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>
    <div class="card">
  <div class="header">
    <span>☰</span>
    <h2>Notifications</h2>
    <span>🔍</span>
  </div>

  <div class="content">
    <div class="line"></div>

    <div class="notification">
      <div class="circle"></div>
      <p class="time">9:24 AM</p>
      <p><strong>John Walker</strong> posted a photo on your wall.</p>
    </div>

    <div class="notification">
      <div class="circle"></div>
      <p class="time">8:19 AM</p>
      <p><strong>Alice Parker</strong> commented your last post.</p>
    </div>

    <div class="notification">
      <div class="circle"></div>
      <p class="time">Yesterday</p>
      <p><strong>Luke Wayne</strong> added you as friend.</p>
    </div>
  </div>
</div>
</body>
</html>
