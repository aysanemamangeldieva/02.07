<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

  <div class="left">

    <div class="avatar">
      <div class="circle1"></div>
      <div class="circle2"></div>
      <img src="https://100dayscss.com/codepen/jessica-potter.jpg" alt="">
    </div>

    <h2>Jessica Potter</h2>
    <p>Visual Artist</p>

    <button>Follow</button>
    <button>Message</button>

  </div>

  <div class="right">
    <div class="box">
      <h2>523</h2>
      <p>Posts</p>
    </div>

    <div class="box">
      <h2>1387</h2>
      <p>Likes</p>
    </div>

    <div class="box">
      <h2>146</h2>
      <p>Follower</p>
    </div>
  </div>

</div>

</body>
</html>
